<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A2233"/>
      <stop offset="100%" stop-color="#0B0F1A"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A8D8EA"/>
      <stop offset="50%" stop-color="#7BA7D4"/>
      <stop offset="100%" stop-color="#C084B0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Orbital rings — three ellipses at 0°, 60°, 120° -->
  <g filter="url(#glow)" opacity="0.88">
    <ellipse cx="32" cy="32" rx="26" ry="8.5"
             fill="none" stroke="#7BA7D4" stroke-width="2"/>
    <ellipse cx="32" cy="32" rx="26" ry="8.5"
             fill="none" stroke="#A8D8EA" stroke-width="2"
             transform="rotate(60 32 32)"/>
    <ellipse cx="32" cy="32" rx="26" ry="8.5"
             fill="none" stroke="#C084B0" stroke-width="2"
             transform="rotate(120 32 32)"/>
  </g>

  <!-- Orbital nodes — outer tips of each ellipse -->
  <circle cx="58" cy="32" r="3.2" fill="#A8D8EA" opacity="0.95"/>
  <circle cx="58" cy="32" r="3.2" fill="#E8896A" opacity="0.95"
          transform="rotate(60 32 32)"/>
  <circle cx="58" cy="32" r="3.2" fill="#C084B0" opacity="0.95"
          transform="rotate(120 32 32)"/>

  <!-- Nucleus -->
  <circle cx="32" cy="32" r="5.5" fill="url(#core)" filter="url(#glow)"/>
</svg>
